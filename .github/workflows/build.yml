name: Build and Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore libusb
        shell: pwsh
        run: |
          $url = "https://github.com/libusb/libusb/releases/download/v1.0.27/libusb-1.0.27-binaries.7z"
          $out = "$env:TEMP\libusb.7z"
          curl.exe -sL $url -o $out
          7z x $out -olibusb
          copy libusb\VS2022\MS64\dll\libusb-1.0.dll libusb-1.0.dll

      - name: Compile with csc
        shell: cmd
        run: |
          "%SystemRoot%\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /target:winexe /reference:System.Windows.Forms.dll /reference:System.Drawing.dll /reference:System.Management.dll /reference:System.Web.Extensions.dll /win32manifest:app.manifest RazerTray.cs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RazerTray
          path: |
            RazerTray.exe
            RazerTray.cs
            NvApi.cs
            app.manifest
            libusb-1.0.dll
            game-modes.config.example
            README.md

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: RazerTray
          path: release

      - name: Create release archive
        run: |
          cd release
          7z a ../RazerTray-${{ github.ref_name }}.zip *

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: RazerTray-${{ github.ref_name }}.zip
          generate_release_notes: true
